[project]
name = "cursed-controls"
version = "0.1.0"
description = "Map any evdev input device to a virtual Xbox 360 wireless receiver over USB OTG"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "black>=25.9.0",
    "evdev>=1.9.2",
    "pyyaml>=6.0.3",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
